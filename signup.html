<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="Copilot_20260329_121355 copy.png">
</head>
<body>
  <div class="login-form">
    <h1>BARANGAY HEALTH CENTER</h1>
    <div class="container">
      <div class="main">
        <div class="content">
          <h2>Sign Up</h2>
           <form onsubmit="window.location.href='login.html'; return false;">
            <input type="text" name="username" pattern="admin" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email Address" required>
             <input type="password" name="password" placeholder="Password" required>
             <input type="password" name="confirm_password" placeholder="Confirm Password" required>
               <button class="btn" type="submit">Sign Up</button>
            </form>

          <p class="account">Already have an account? <a href="login.html">Login here</a></p>
          
        </div>
        <div class="form-img">
          <img src="Copilot_20260329_204040.png" alt="">
        </div>
      </div>
    </div>
  </div>
</body>
</html>
