<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/png" href="Copilot_20260329_121355 copy.png">
</head>
<body>
  <div class="login-form">
    <h1></h1>
    <div class="container">
      <div class="main">
        <div class="content">
          <h2>Login</h2>
          <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button class="btn login-btn" type="submit">Login</button>
            <div id="loginMessage" style="color: red; margin-top: 10px;"></div>
          </form>
          <button class="btn forget-btn" onclick="window.location.href='signup.html'">Sign Up</button>
          <div class="back">
            <a href="index.html">Back to home</a>
          </div>
          <p>Default: admin / 123</p>
        </div>
        <div class="form-img">
          <img src="Copilot_20260329_204040.png" alt="Health Center">
        </div>
      </div>
    </div>
  </div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const messageEl = document.getElementById('loginMessage');

  try {
    const response = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await response.json();

    if (data.success) {
      localStorage.setItem('sessionId', data.sessionId);
      window.location.href = 'admindashboard.html';
    } else {
      messageEl.textContent = data.message || 'Login failed';
    }
  } catch (err) {
    messageEl.textContent = 'Server not running. Start with: npm run dev';
  }
});
</script>
</body>
</html>
