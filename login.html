<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/png" href="Copilot_20260329_121355 copy.png">
</head>
<body>
  <div class="login-form">
    <h1></h1>
    <div class="container">
      <div class="main">
        <div class="content">
          <h2>Login</h2>
          <form action="admindashboard.html" method="get">
            <input type="text" name="username" pattern="admin" placeholder="Username" required title="Username must be 'admin'">
            <input type="password" name="password" pattern="123" placeholder="Password" required title="Password must be '123'">
            <button class="btn login-btn" type="submit">Login</button>
            <button class="btn forget-btn" type="button" onclick="window.location.href='signup.html'">Forget Password</button>
          </form>
          <p class="account">Don't have an account? <a href="signup.html">Sign up</a></p>
          <div class="back">
            <a href="index.html">Back to home</a>
          </div>
        </div>
        <div class="form-img">
          <img src="Copilot_20260329_204040.png" alt="Health Center">
        </div>
      </div>
    </div>
  </div>
</body>
</html>
